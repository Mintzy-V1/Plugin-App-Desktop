appId: com.mintzy.plugin-desktop
productName: Mintzy Plugin
copyright: Copyright (c) 2026 Mintzy V1

publish:
  provider: s3
  bucket: YOUR_S3_BUCKET_NAME
  region: YOUR_S3_REGION
  acl: public-read

directories:
  output: release
  buildResources: build

files:
  - src/**/*
  - package.json
  - assets/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Mintzy Plugin
  artifactName: "${productName} Setup ${version}.${ext}"
